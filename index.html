            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 850px;
            background-color: #ffffff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            position: relative;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 640px) {
            .app-container {
                height: 90vh;
                border-radius: 24px;
            }
        }

        .font-sahabat {
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.1em;
            background: linear-gradient(to bottom, #1e293b, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(1px 1px 0px rgba(255,255,255,0.3));
        }

        .btn-masuk {
            background-color: var(--accent-green);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-masuk:hover {
            background-color: #059669;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-nav {
            background-color: var(--primary-blue);
            border-radius: 12px;
            color: white;
            padding: 12px 24px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .option-item {
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #e5e7eb;
            background-color: #f9fafb;
        }

        .selected-option {
            background-color: #dbeafe !important;
            border-color: #3b82f6 !important;
            transform: translateX(8px);
        }

        #loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(4px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
        }

        .input-field {
            background-color: #ffffff;
            color: #1e293b;
            text-align: center;
            font-weight: bold;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            border: 2px solid #cbd5e1;
            outline: none;
        }

            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;

    let currentQuestionIndex = 0;

    let startTime;
    let timerInterval;

    function startExam() {
        userData.name = document.getElementById('name').value.trim();
        userData.absen = document.getElementById('absen').value.trim();

        if (!userData.name || !userData.absen) {
            alert("Isi Nama dan Absen!");
            return;
        }

        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('exam-screen').classList.remove('hidden');
        document.getElementById('total-questions').innerText = questions.length;
        
        startTime = new Date();
        timerInterval = setInterval(updateTimer, 1000);
        renderQuestion();
    }

    function updateTimer() {
        const diff = Math.floor((new Date() - startTime) / 1000);
        const m = Math.floor(diff / 60).toString().padStart(2, '0');
        const s = (diff % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:${s}`;
    }

        const q = questions[currentQuestionIndex];
        document.getElementById('current-number').innerText = currentQuestionIndex + 1;
        document.getElementById('question-text').innerText = q.text;
        document.getElementById('progress-bar').style.width = `${((currentQuestionIndex + 1) / questions.length) * 100}%`;

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.options.forEach(opt => {
            const isSelected = userAnswers[currentQuestionIndex] === opt.id;
            const div = document.createElement('div');
            div.className = `option-item p-4 rounded-xl font-medium flex items-center shadow-sm ${isSelected ? 'selected-option' : ''}`;
            div.innerHTML = `
                <div class="w-7 h-7 rounded-full flex items-center justify-center mr-3 text-xs font-bold ${isSelected ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-600'}">
                    ${opt.id}
                </div>
                <span class="text-sm">${opt.text}</span>
            `;
            div.onclick = () => { 
                userAnswers[currentQuestionIndex] = opt.id; 
                renderQuestion(); 
            };
            container.appendChild(div);
        });

        document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
        document.getElementById('prev-btn').style.opacity = currentQuestionIndex === 0 ? '0.5' : '1';
        document.getElementById('next-btn').innerText = currentQuestionIndex === questions.length - 1 ? "SELESAI" : "LANJUT";
    }

    function handleNext() {
        if (currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            renderQuestion();
        } else {
            document.getElementById('confirm-modal').style.display = 'flex';
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            renderQuestion();
        }
    }

    function hideConfirm() { 
        document.getElementById('confirm-modal').style.display = 'none'; 
    }

    async function finishExam() {
        hideConfirm();
        clearInterval(timerInterval);
        document.getElementById('loading-overlay').style.display = 'flex';

        let correct = 0;
        questions.forEach((q, i) => { if (userAnswers[i] === q.correct) correct++; });
        const score = Math.round((correct / questions.length) * 100);

        const payload = new URLSearchParams();
        payload.append('timestamp', new Date().toLocaleString());
        payload.append('nama', userData.name);
        payload.append('absen', userData.absen);
        payload.append('skor', score);
        payload.append('durasi', document.getElementById('timer').innerText);

        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: payload });
            showResult(score, correct);
        } catch (e) {
            showResult(score, correct);
        } finally {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    }

    function showResult(score, correct) {
        document.getElementById('exam-screen').innerHTML = `
            <div class="flex flex-col items-center justify-center text-center h-full py-6">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h1 class="text-xl font-black mb-1">UJIAN SELESAI</h1>
                <p class="text-xs text-gray-500 mb-6">${userData.name} - Absen ${userData.absen}</p>
                
                <div class="text-6xl font-black text-blue-600 mb-6">${score}</div>

                <div class="grid grid-cols-2 gap-3 w-full mb-6">
                    <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                        <div class="text-[10px] text-gray-400">Benar</div>
                        <div class="text-lg font-bold text-green-600">${correct}</div>
                    </div>
                    <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                        <div class="text-[10px] text-gray-400">Salah</div>
                        <div class="text-lg font-bold text-red-500">${questions.length - correct}</div>
                    </div>
                </div>

                <button onclick="location.reload()" class="btn-nav w-full py-3 uppercase">Kembali</button>
            </div>
        `;
    }
</script>
</body>
</html>
